<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: url('images/LoginRegister.jpg') no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
}

/* Navbar styles */
       .navbar {
           display: flex;
           justify-content: space-between;
           align-items: center;
           background-color: #4A148C;
           padding: 0 20px;
           height: 70px; /* Consistent height */
           color: #fff;
           box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
           font-size: 1rem; /* Consistent text size */
       }

       .navbar .logo {
           font-size: 2.0rem;
           font-weight: bold;
           color: #f9a826;
       }

       .navbar ul {
           list-style: none;
           display: flex;
           gap: 20px;
           margin:0;
       }

       .navbar ul li {
           display: inline;
       }

       .navbar ul li a {
           text-decoration: none;
           color: #fff;
           font-size: 1rem;
           transition: color 0.3s ease, background-color 0.3s ease;
           padding: 10px 15px;
           border-radius: 5px;
       }

       .navbar ul li a:hover {
           background-color: #6A1B9A;
           color: #f9a826;
       }

.container-box {
    max-width: 420px;
    margin: 80px auto;
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4A148C;
    color: white;
    border: none;
    border-radius: 5px;
    margin-bottom: 10px;
}

button:hover {
    background: #6A1B9A;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

.step {
    display: none;
}

.step.active {
    display: block;
}

.timer {
    text-align: center;
    color: red;
    font-weight: bold;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">AthleticaX</div>
    <ul>
        <li><a href="Welcome.html">Home</a></li>
        <li><a href="PublicEvent.html">Events</a></li>
        <li><a href="PublicNews.html">News</a></li>
        <li><a href="Login.html">Login</a></li>
        <li><a href="Register.html">Sign Up</a></li>
    </ul>
</nav>

<div class="container-box">

    <h2>Forgot Password</h2>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
        <input type="email" id="email" placeholder="Enter registered email" required>
        <button onclick="sendOtp()">Send OTP</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

        <div class="timer">
            Resend OTP in: <span id="countdown">300</span>s
        </div>

        <input type="password" id="otp" placeholder="Enter OTP" required>

        <button onclick="verifyOtp()">Verify OTP</button>

        <button id="resendBtn" onclick="resendOtp()" disabled>
            Resend OTP
        </button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step">
        <input type="password" id="newPassword" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button onclick="resetPassword()">Reset Password</button>
    </div>

</div>
<script src="config.js"></script>
<script>

let emailStored = "";
let timeLeft = 300;
let timer;

const resendBtn = document.getElementById("resendBtn");
const countdownEl = document.getElementById("countdown");

// STEP 1: SEND OTP
function sendOtp() {

    emailStored = document.getElementById("email").value;

    if (!emailStored) {
        alert("Please enter email");
        return;
    }

    fetch(`${API_BASE}/api/auth/forgot-password?email=` + emailStored, {
        method: "POST"
    })
    .then(res => {
        if (!res.ok) return res.text().then(msg => { throw new Error(msg); });

        alert("OTP sent successfully");

        document.getElementById("step1").classList.remove("active");
        document.getElementById("step2").classList.add("active");

        startTimer();
    })
    .catch(err => alert(err.message));
}


// STEP 2: VERIFY OTP
function verifyOtp() {

    const otp = document.getElementById("otp").value;

    fetch(`${API_BASE}/api/auth/verify-otp-reset?email=${emailStored}&otp=${otp}`, {
        method: "POST"
    })
    .then(res => {
        if (!res.ok) return res.text().then(msg => { throw new Error(msg); });

        alert("OTP verified");

        document.getElementById("step2").classList.remove("active");
        document.getElementById("step3").classList.add("active");
    })
    .catch(err => alert(err.message));
}


// STEP 3: RESET PASSWORD
function resetPassword() {

    const password = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    fetch(`${API_BASE}/api/auth/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: emailStored,
            password: password,
            confirmPassword: confirmPassword
        })
    })
    .then(res => {
        if (!res.ok) return res.text().then(msg => { throw new Error(msg); });

        alert("Password reset successful");
        window.location.href = "Login.html";
    })
    .catch(err => alert(err.message));
}


// RESEND OTP
function resendOtp() {

    fetch(`${API_BASE}/api/auth/resend-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: emailStored })
    })
    .then(res => {
        if (!res.ok) return res.text().then(msg => { throw new Error(msg); });

        alert("OTP resent successfully");

        startTimer();
    })
    .catch(err => alert(err.message));
}


// 300s TIMER
function startTimer() {

    clearInterval(timer);
    timeLeft = 300;

    resendBtn.disabled = true;
    countdownEl.innerText = timeLeft;

    timer = setInterval(() => {

        timeLeft--;
        countdownEl.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            resendBtn.disabled = false;
        }

    }, 1000);
}

</script>

</body>
</html>
