<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: url('images/LoginRegister.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #4A148C;
            padding: 0 20px;
            height: 70px;
            color: #fff;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f9a826;
        }

        .container-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4A148C;
            color: white;
            border: none;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        button:hover {
            background: #6A1B9A;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        .timer {
            text-align: center;
            margin-bottom: 10px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo">SPORTS PORTAL</div>
</nav>

<div class="container-box">
    <h2>OTP Verification</h2>

    <div class="timer">
        OTP expires in: <span id="countdown">300</span> seconds
    </div>

    <input type="password" id="otp" placeholder="Enter 6-digit OTP">

    <button onclick="verifyOtp()">Verify OTP</button>

    <!-- ✅ NEW -->
    <button id="resendBtn" onclick="resendOtp()" disabled>
        Resend OTP
    </button>
</div>
<script src="config.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const registerData = sessionStorage.getItem("registerData");

    if (!registerData) {
        alert("Unauthorized access. Please register/login first.");
        window.location.href = "Register.html"; // or Login.html
      }
    });

    let timeLeft = 300;
    let timer;

    const countdownEl = document.getElementById("countdown");
    const resendBtn = document.getElementById("resendBtn");

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                resendBtn.disabled = false;
            }
        }, 1000);
    }

    startTimer();

    function verifyOtp() {

        const otp = document.getElementById("otp").value;

        if (!otp || otp.length !== 6) {
            alert("Enter valid 6-digit OTP");
            return;
        }

        const registerData = JSON.parse(sessionStorage.getItem("registerData"));

        if (!registerData) {
            alert("Session expired. Please register again.");
            window.location.href = "Register.html";
            return;
        }

        const { name, email, password, role } = registerData;

        fetch(`${API_BASE}/api/auth/register-with-otp?otp=` + otp, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, password, role })
        })
        .then(res => {
            if (res.ok) {
                alert("Account created successfully!");
                sessionStorage.removeItem("registerData");
                window.location.href = "Login.html";
            } else {
                return res.text().then(msg => { throw new Error(msg); });
            }
        })
        .catch(err => {
            alert("Error: " + err.message);
        });
    }

    function resendOtp() {

        const registerData = JSON.parse(sessionStorage.getItem("registerData"));

        if (!registerData) {
            alert("Session expired. Please register again.");
            window.location.href = "Register.html";
            return;
        }

        fetch(`${API_BASE}/api/auth/resend-otp`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(registerData)
        })
        .then(res => {
            if (!res.ok) {
                return res.text().then(msg => { throw new Error(msg); });
            }

            alert("OTP resent successfully!");

            // 🔁 Reset timer
            timeLeft = 300;
            resendBtn.disabled = true;
            clearInterval(timer);
            startTimer();
        })
        .catch(err => {
            alert(err.message);
        });
    }

</script>

</body>
</html>
