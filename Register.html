<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            background: url('images/LoginRegister.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* Navbar styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #4A148C;
            padding: 0 20px;
            height: 70px; /* Consistent height */
            color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-size: 1rem; /* Consistent text size */
        }

        .navbar .logo {
            font-size: 2.0rem;
            font-weight: bold;
            color: #f9a826;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        .navbar ul li {
            display: inline;
        }

        .navbar ul li a {
            text-decoration: none;
            color: #fff;
            font-size: 1rem;
            transition: color 0.3s ease, background-color 0.3s ease;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .navbar ul li a:hover {
            background-color: #6A1B9A;
            color: #f9a826;
        }

        /* Main content styles */
        #main-section {
            flex: 1; /* Ensures it grows to fill space between header and footer */
            padding: 35px;
        }

        /* Footer styles */
        footer {
            text-align: center;
            padding: 15px 0;
            background-color: #4A148C;
            color: #fff;
            flex-shrink: 0;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, select {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4A148C;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #6A1B9A;
             color: #f9a826;
        }

        p {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        p a {
            color: #4A148C;
            text-decoration: none;
        }

        p a:hover {
            text-decoration: underline;
        }


        /* Popup Styles */
        #popup-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            padding: 20px;
            z-index: 1000;
            text-align: center;
            width: 350px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden {
            display: none;
        }

        .popup-content {
            font-family: 'Arial', sans-serif;
            color: #333;
        }

        #popup-text {
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 500;
        }

        .popup-close-btn {
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .popup-close-btn:hover {
            background-color: #0056b3;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        body.popup-active::after {
            display: block;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar">
    <div class="logo">AthleticaX</div>
    <ul>
        <li><a href="Welcome.html">Home</a></li>
        <li><a href="PublicEvent.html">Events</a></li>
        <li><a href="PublicNews.html">News</a></li>
        <li><a href="Login.html">Login</a></li>
        <li><a href="Register.html">Sign Up</a></li>
    </ul>
</nav>
<div id="main-section">
<div class="container">
    <h2>Register</h2>
    <form id="registerForm" method="post" novalidate>
        <input id="name" placeholder="Full Name" required type="text">
        <div class="error-message" id="nameError"></div>

        <input id="email" placeholder="Email" required type="email">
        <div class="error-message" id="emailError"></div>

        <input id="password" placeholder="Password" required type="password">
        <div class="error-message" id="passwordError"></div>

        <input id="confirmPassword" placeholder="Confirm Password" required type="password">
        <div class="error-message" id="confirmPasswordError"></div>

        <select id="role" required>
            <option disabled selected value="">Select Role</option>
            <option value="COACH">Coach</option>
            <option value="ATHLETE">Athlete</option>
            <option value="ADMIN" id="adminOption">Admin</option>
        </select>
        <div class="error-message" id="roleError"></div>

        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="Login.html">Login here</a></p>
</div>
</div>
<!-- Popup Message -->
<div class="hidden" id="popup-message">
    <div class="popup-content">
        <span id="popup-text"></span>
        <button class="popup-close-btn" id="ok-popup">Ok</button>
    </div>
</div>
<!-- Footer -->
<footer>
    <p>&copy; 2026 Sports Management Platform. All rights reserved.</p>
</footer>
<script src="config.js"></script>
<script>
    const registerForm = document.getElementById('registerForm');

    // Check if admin exists on page load
    document.addEventListener('DOMContentLoaded', function() {
        fetch(`${API_BASE}/api/auth/check-admin-exists`)
            .then(res => res.json())
            .then(data => {
                if (data.adminExists) {
                    const adminOption = document.getElementById('adminOption');
                    if (adminOption) {
                        adminOption.remove();
                    }
                }
            })
            .catch(err => {
                console.log("Could not check admin status:", err);
            });
    });

    registerForm.addEventListener('submit', function (e) {
      e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const role = document.getElementById('role').value;

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    const userData = {
        name,
        email,
        password,
        role
    };

    // Save temporarily for OTP page
    sessionStorage.setItem("registerData", JSON.stringify(userData));

    // STEP 1: SEND OTP
    fetch(`${API_BASE}/api/auth/send-otp`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(userData)
    })
    .then(res => {
        if (!res.ok) throw new Error("OTP sending failed");

        alert("OTP sent to your email");

        // Redirect to OTP page
        window.location.href = "OTP.html";
    })
    .catch(err => {
        alert(err.message);
    });
});
</script>
</body>
</html>
