<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Coaches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="unified-styles-athlete.css" rel="stylesheet">
    <style>
        /* Footer styles */
       footer {
             position: fixed;
             left: 0;
             bottom: 0;
             width: 100%;
             text-align: center;
             padding: 15px 0;
             background-color: #4A148C;
             color: #fff;
             flex-shrink: 0;
         }

         footer p {
             margin: 0;
             font-size: 0.9rem;
         }

        .container{
             flex: 1;
         }
        .card {
             background-color: #e8e3f7; /* Light purple */
             border: 1px solid #d4c9f0;
             border-radius: 10px;
             overflow: hidden;
             transition: transform 0.3s ease;
         }

         .card:hover {
             transform: translateY(-5px);
             box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
         }

         .card img {
             object-fit: cover;
         }
         .card .card-body span {
             display: block;
             color: #4a3c71;
             margin-bottom: 0.5rem;
         }

         .card .card-body strong {
             color: #2f244d;
         }
    </style>
</head>
<body>
<!-- Athlete Navigation Bar -->
<header class="navbar">
    <div class="logo">Athlete</div>
    <nav>
        <ul>
            <li><a href="AthleteHome.html">Home</a></li>
            <li><a href="AthleteEvent.html">Events</a></li>
            <li><a href="CoachesForAthlete.html">Coaches</a></li>
            <li><a href="AthleteResult.html">Results</a></li>
            <li><a href="AthleteNews.html">News</a></li>
            <li><a href="AthleteProfile.html">Profile</a></li>
            <li><a href="" onclick="logout()">Logout</a></li>
        </ul>
    </nav>
</header>
<div class="container my-5">
    <!-- Filters Section -->
    <div class="row mb-4">
        <div class="col-md-4">
            <input class="form-control" id="searchInput" oninput="filterCoaches()" placeholder="Search by name"
                   type="text">
        </div>
        <div class="col-md-4">
            <select class="form-select" id="categoryFilter" onchange="filterCoaches()">
                <option value="">All Categories</option>
            </select>
        </div>
        <!-- Added Gender Filter Here -->
        <div class="col-md-4">
            <select class="form-select" id="genderFilter" onchange="filterCoaches()">
                <option value="">All Genders</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
    </div>

    <!-- Coaches Cards Section -->
    <div class="row g-4" id="coachesContainer"></div>
</div>
<!-- Footer -->
<footer>
    <p>&copy; 2026 Sports Management Platform. All rights reserved.</p>
</footer>
<script crossorigin="anonymous"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script defer src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="TokenCheck.js"></script>
<script src="config.js"></script>
<script>
    const API_URL = `${API_BASE}/api/coach`;
    const BEARER_TOKEN = localStorage.getItem("token");
    let coaches = [];

    window.onload = async function () {
        try {
            const response = await fetch(API_URL, {
                method: "GET",
                headers: {
                    Authorization: `Bearer ${BEARER_TOKEN}`,
                    "Content-Type": "application/json",
                },
            });

            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            coaches = await response.json();

            populateCategoryFilter();
            renderCoaches(coaches);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    };

    function formatImage(imageLink) {
        if (!imageLink || imageLink.trim() === "") {
            return "images/user.png";
        }
        if (imageLink.startsWith("data:image/")) {
            return imageLink;
        }
        return `data:image/jpeg;base64,${imageLink}`;
    }

    function renderCoaches(data) {
        const container = document.getElementById("coachesContainer");
        container.innerHTML = ""; // Clear the container

        if (data.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted">No coaches found.</div>';
            return;
        }

        data.forEach((coach) => {
            const card = document.createElement("div");
            card.className = "col-md-6";

            const birthDate = formatBirthDate(coach.birthDate);
            const imageUrl = formatImage(coach.imageLink);

            card.innerHTML = `
                <div class="card d-flex flex-row">
                    <img src="${imageUrl}" alt="${coach.name || "Coach's image"}" class="img-fluid" style="width: 150px; height: 150px; object-fit: cover;">
                    <div class="card-body">
                        <span><strong>Name:</strong> ${coach.name || "N/A"}</span>
                        <span><strong>Category:</strong> ${coach.category || "N/A"}</span>
                        <span><strong>Gender:</strong> ${coach.gender || "N/A"}</span>
                        <span><strong>Birth Date:</strong> ${birthDate}</span>
                    </div>
                </div>
            `;

            container.appendChild(card);
        });
    }

    function populateCategoryFilter() {
        const categories = [...new Set(coaches.map((coach) => coach.category).filter(Boolean))];
        const categoryFilter = document.getElementById("categoryFilter");

        categories.forEach((category) => {
            const option = document.createElement("option");
            option.value = category;
            option.textContent = category;
            categoryFilter.appendChild(option);
        });
    }

    function filterCoaches() {
        const searchInput = document.getElementById("searchInput").value.toLowerCase();
        const selectedCategory = document.getElementById("categoryFilter").value;
        const selectedGender = document.getElementById("genderFilter").value; // Grab gender filter

        const filteredCoaches = coaches.filter((coach) => {
            const matchesName = coach.name.toLowerCase().includes(searchInput);
            const matchesCategory = selectedCategory ? coach.category === selectedCategory : true;

            // Check gender (case insensitive safely)
            const matchesGender = selectedGender
                ? (coach.gender || "").toLowerCase() === selectedGender.toLowerCase()
                : true;

            return matchesName && matchesCategory && matchesGender;
        });

        renderCoaches(filteredCoaches);
    }

    const formatBirthDate = (dateString) => {
        if (!dateString) return "N/A";
        const parts = dateString.split("/"); // Assuming the input is "DD/MM/YYYY"
        if (parts.length === 3) {
            const [day, month, year] = parts;
            return `${day}/${month}/${year}`;
        }
        const date = new Date(dateString);
        return isNaN(date) ? "Invalid Date" : date.toLocaleDateString("en-GB");
    };

</script>
</body>
</html>
