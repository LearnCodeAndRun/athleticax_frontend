<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body, html {
   margin: 0;
   padding: 0;
   min-height: 100vh;
   display: flex;
   flex-direction: column;
   font-family: Arial, sans-serif;
   background: url('images/LoginRegister.jpg') no-repeat center center;
   background-size: cover;
   background-attachment: fixed;
   background-position: center;
}

 /* Navbar styles */
       .navbar {
           display: flex;
           justify-content: space-between;
           align-items: center;
           background-color: #4A148C;
           padding: 0 20px;
           height: 70px; /* Consistent height */
           color: #fff;
           box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
           font-size: 1rem; /* Consistent text size */
       }

       .navbar .logo {
           font-size: 2.0rem;
           font-weight: bold;
           color: #f9a826;
       }

       .navbar ul {
           list-style: none;
           display: flex;
           gap: 20px;
           margin:0;
       }

       .navbar ul li {
           display: inline;
       }

       .navbar ul li a {
           text-decoration: none;
           color: #fff;
           font-size: 1rem;
           transition: color 0.3s ease, background-color 0.3s ease;
           padding: 10px 15px;
           border-radius: 5px;
       }

       .navbar ul li a:hover {
           background-color: #6A1B9A;
           color: #f9a826;
       }



/* Main */
#main-section {
   flex: 1;
   padding: 100px;
}

.container {
   background-color: rgba(255, 255, 255, 0.85);
   padding: 30px;
   border-radius: 10px;
   box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
   width: 100%;
   max-width: 400px;
}

h2 {
   text-align: center;
   margin-bottom: 20px;
}

input {
   width: 100%;
   margin-bottom: 15px;
   padding: 10px;
   border: 1px solid #ccc;
   border-radius: 5px;
}

button {
   width: 100%;
   padding: 10px;
   border: none;
   border-radius: 5px;
   background-color: #4A148C;
   color: #fff;
   font-size: 16px;
   cursor: pointer;
}

button:hover {
   background-color: #6A1B9A;
}

/* Links */
p {
   text-align: center;
   margin-top: 15px;
   font-size: 14px;
}

p a {
   color: #4A148C;
   text-decoration: none;
}

p a:hover {
   text-decoration: underline;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">AthleticaX</div>
    <ul>
        <li><a href="Welcome.html">Home</a></li>
        <li><a href="PublicEvent.html">Events</a></li>
        <li><a href="PublicNews.html">News</a></li>
        <li><a href="Login.html">Login</a></li>
        <li><a href="Register.html">Sign Up</a></li>
    </ul>
</nav>

<div id="main-section">
<div class="container">

    <h2>Login</h2>

    <div id="errorMessage" style="color:red;font-weight:bold;text-align:center;display:none;"></div>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- EXISTING REGISTER LINK -->
    <p>
        Don't have an account? <a href="Register.html">Register here</a>
    </p>

    <!-- ✅ NEW FORGOT PASSWORD LINK -->
    <p>
        <a href="ForgotPassword.html">Forgot Password?</a>
    </p>

</div>
</div>

<footer>
    <p>&copy; 2026 Sports Management Platform. All rights reserved.</p>
</footer>
<script src="config.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
    })
    .then(res => {
        if (!res.ok) throw new Error('Invalid credentials');
        return res.json();
    })
    .then(data => {
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('email', email);
        localStorage.setItem('roleId', data.roleId);

        if (data.role === 'ADMIN') window.location.href = 'AdminHome.html';
        else if (data.role === 'COACH') window.location.href = 'CoachHome.html';
        else window.location.href = 'AthleteHome.html';
    })
    .catch(err => {
        document.getElementById('errorMessage').innerText = err.message;
        document.getElementById('errorMessage').style.display = 'block';
    });
});
</script>

</body>
</html>
